services:
  liquibase:
    image: liquibase/liquibase:latest-alpine
    env_file:
      - .env
    volumes:
      - ./migrations:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      --username=${DB_USER}
      --password=${DB_PASSWORD}
      --changeLogFile=changelog.xml
      update
