databaseChangeLog:
  - changeSet:
      id: 001_update_timestamp_fn
      author: ${TEAM_NAME}
      comment: Function to auto-update updated_at column on row change
      runOnChange: true
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION update_timestamp()
              RETURNS TRIGGER AS $$
              BEGIN
                  NEW.updated_at = NOW();
                  RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;
      rollback:
        - sql:
            sql: DROP FUNCTION IF EXISTS update_timestamp();